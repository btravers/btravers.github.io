name: Sync Articles to Dev.to

on:
  push:
    branches:
      - main
    paths:
      - "blog/**/*.md"
      - "!blog/index.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-to-devto:
    name: Sync to Dev.to
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Sync articles to Dev.to
        env:
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}
        run: pnpm run sync:devto

      - name: Commit updated article metadata
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add blog/*.md
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update dev.to article IDs [skip ci]"
            git push
          fi
