<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 40" width="100" height="40" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Benoit TRAVERS</title>
  <desc id="logoDesc">BT monogram logo</desc>
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f766e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14b8a6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <text x="50" y="30" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="url(#textGrad)" text-anchor="middle">{BT}</text>
</svg>
